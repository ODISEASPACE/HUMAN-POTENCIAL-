<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odisea | Potencial Humano</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: { 
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        fondo: '#F8FAFC',     /* Gris Off-White para no cansar la vista */
                        primario: '#0F172A',  /* Azul marino oscuro para textos (Seriedad) */
                        acento: '#2563EB'     /* Azul eléctrico para el botón principal (Acción) */
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-fondo text-primario font-sans h-screen flex items-center justify-center">

    <main class="max-w-2xl mx-auto p-8 text-center">
        
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 uppercase">
            BIENVENIDO A LA APLICACIÓN DEL POTENCIAL HUMANO </h1>

        <p class="text-lg text-slate-600 mb-10">
            Descubre tu arquetipo conductual y diseña una trayectoria basada en datos, disciplina y propósito.
        </p>

        <div class="flex flex-col gap-4 w-full md:w-3/4 mx-auto">
            
            <a href="legal.html" class="bg-acento hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg transition-transform transform hover:scale-105 text-lg">
                Iniciar Test VOC
            </a>

            <div class="grid grid-cols-2 gap-4 mt-3">
                <button class="bg-white border-2 border-slate-200 hover:border-primario hover:text-primario text-slate-600 font-semibold py-3 px-4 rounded-xl transition-all">
                    Registrarse
                </button>
                <button class="bg-white border-2 border-slate-200 hover:border-primario hover:text-primario text-slate-600 font-semibold py-3 px-4 rounded-xl transition-all">
                    Iniciar Sesión
                </button>
            </div>
            
        </div>
    </main>

</body>
</html>
